name: Frontend CI

on:
    pull_request:
        paths:
            - "frontend/**"
            - ".github/workflows/frontend-ci.yml"
    push:
        branches:
            - main
            - production
        paths:
            - "frontend/**"
            - ".github/workflows/frontend-ci.yml"

permissions:
    contents: read

concurrency:
    group: frontend-deploy
    cancel-in-progress: true

jobs:
    test:
        name: Test and Build
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run frontend checks
              run: npm test

    deploy-main:
        name: Deploy Main to Vercel
        needs: test
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Deploy to Vercel
              uses: amondnet/vercel-action@v42.2.0
              with:
                  vercel-token: ${{ secrets.VERCEL_TOKEN_MAIN }}
                  vercel-org-id: ${{ secrets.VERCEL_TEAM_ID_MAIN }}
                  vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_MAIN }}
                  target: production
                  working-directory: ./frontend

    deploy-production:
        name: Deploy Production Branch to Vercel
        needs: test
        if: github.event_name == 'push' && github.ref == 'refs/heads/production'
        runs-on: ubuntu-latest
        environment: production
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Deploy to Vercel
              uses: amondnet/vercel-action@v42.2.0
              with:
                  vercel-token: ${{ secrets.VERCEL_TOKEN_PROD }}
                  vercel-org-id: ${{ secrets.VERCEL_TEAM_ID_PROD }}
                  vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
                  target: production
                  working-directory: ./frontend
